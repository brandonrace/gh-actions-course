name: 17 - Custom Actions - Composite
run-name: 17 - 1 - Custom Actions - Composite | env ${{ inputs.target-env }}


on:
  workflow_dispatch:
    inputs:
      target-env:
        description: Which environment to target for depedency installation
        type: choice
        options:
          - dev
          - prod

env:
  working-directory: 17-custom-actions/react-app

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node and NPM Dependencies
        uses: ./.github/actions/composite-cache-deps
        with:
          node-version: 24.x
          working-dir: ${{ env.working-directory }}
          target-env: ${{ inputs.target-env }}
      - name: Test
        run: npm run test
        working-directory: ${{ env.working-directory }}
      - name: Build
        run: npm run build
        working-directory: ${{ env.working-directory }}