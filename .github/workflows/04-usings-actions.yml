name: 04 - Using Actions

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Install Dependencies
        working-directory: 04-using-actions/react-app
        run: npm ci
      - name: Run Unit Tests
        working-directory: 04-using-actions/react-app
        run: npm run test
